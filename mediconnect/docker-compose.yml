services:

  # ── INFRASTRUCTURE ──────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: mediconnect-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Parthiban1605
      MYSQL_DATABASE: mediconnect_users
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql  # ← add this!
    networks:
      - mediconnect-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mediconnect-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - mediconnect-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mediconnect-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mediconnect-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── SPRING BOOT SERVICES ─────────────────────────

  service-registry:
    build: ./service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    networks:
      - mediconnect-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    networks:
      - mediconnect-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - CONFIG_SERVER_URL=http://config-server:8888
    networks:
      - mediconnect-network
    restart: on-failure

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediconnect_users
    networks:
      - mediconnect-network
    restart: on-failure

  doctor-service:
    build: ./doctor-service
    container_name: doctor-service
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediconnect_doctors
    networks:
      - mediconnect-network
    restart: on-failure

  appointment-service:
    build: ./appointment-service
    container_name: appointment-service
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediconnect_appointments
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - mediconnect-network
    restart: on-failure

  prescription-service:
    build: ./prescription-service
    container_name: prescription-service
    ports:
      - "8084:8084"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediconnect_prescriptions
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - mediconnect-network
    restart: on-failure

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8085:8085"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mediconnect_payments
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - mediconnect-network
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8086:8086"
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_MONGODB_HOST=mongodb
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD}
    networks:
      - mediconnect-network
    restart: on-failure

# ── VOLUMES ──────────────────────────────────────
volumes:
  mysql-data:
  mongo-data:

# ── NETWORKS ─────────────────────────────────────
networks:
  mediconnect-network:
    driver: bridge